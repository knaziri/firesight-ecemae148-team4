services:

  robot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: firetruck_robot
    container_name: robot_container
    network_mode: host
    privileged: true
    environment:
      - ROS_DOMAIN_ID=42
      - ROS_HOSTNAME=${PI_IP}
    volumes:
      - ./src:/firetruck_ws/src
      - /dev:/dev
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               cd /firetruck_ws &&
               colcon build --symlink-install &&
               source install/setup.bash &&
               ros2 launch robot_pkg robot.launch.py"
